services:
  - type: web
    name: job-digest-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # paste Supabase connection string in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # auto-generated by Render
      - key: CRON_SECRET
        generateValue: true  # auto-generated; copy this into cron-job.org header
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false          # set to https://jobs.yourdomain.com
      - key: PORTAL_URL
        sync: false          # set to https://jobs.yourdomain.com
      - key: CRON_SCHEDULE
        value: "30 1 * * *"  # kept as fallback; primary trigger is cron-job.org
